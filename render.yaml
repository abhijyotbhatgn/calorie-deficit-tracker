services:
  - type: web
    name: calorie-deficit-tracker
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
